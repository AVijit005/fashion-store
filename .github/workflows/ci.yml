name: Aura Streetwear CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Backend Test Suite
    runs-on: ubuntu-latest
    
    # Define Redis and Postgres as sidecar containers
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: fashion_store_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Setup Bun (for frontend if needed)
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: 'latest'

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Setup Prisma Database
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://root:root@localhost:5432/fashion_store_test
      run: npx prisma db push --accept-data-loss && npx prisma generate

    - name: Run Lint
      working-directory: ./backend
      run: npm run lint

    - name: Security Audit
      working-directory: ./backend
      run: npm audit --audit-level=high || true

    - name: TypeScript Check
      working-directory: ./backend
      run: npx tsc --noEmit

    - name: Run Backend Unit Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://root:root@localhost:5432/fashion_store_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci_dummy_jwt_secret
        PORT: 3000
        RAZORPAY_KEY_ID: mock_key_id
        RAZORPAY_KEY_SECRET: mock_key_secret
        RAZORPAY_WEBHOOK_SECRET: mock_webhook_secret
        AWS_ACCESS_KEY_ID: mock_aws_key
        AWS_SECRET_ACCESS_KEY: mock_aws_secret
        AWS_REGION: us-east-1
        AWS_S3_BUCKET: mock-bucket
      run: npm run test

    - name: Run Backend E2E Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://root:root@localhost:5432/fashion_store_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci_dummy_jwt_secret
        PORT: 3000
        RAZORPAY_KEY_ID: mock_key_id
        RAZORPAY_KEY_SECRET: mock_key_secret
        RAZORPAY_WEBHOOK_SECRET: mock_webhook_secret
        AWS_ACCESS_KEY_ID: mock_aws_key
        AWS_SECRET_ACCESS_KEY: mock_aws_secret
        AWS_REGION: us-east-1
        AWS_S3_BUCKET: mock-bucket
        NODE_OPTIONS: "--experimental-vm-modules"
      run: npx prisma db push --force-reset --accept-data-loss && npm run test:e2e
