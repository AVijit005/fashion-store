name: Aura Streetwear CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Backend Test Suite
    runs-on: ubuntu-latest
    
    # Define Redis and Postgres as sidecar containers
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aura_user
          POSTGRES_PASSWORD: aura_password
          POSTGRES_DB: aura_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Setup Bun (for frontend if needed)
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: 'latest'

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Setup Prisma Database
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://aura_user:aura_password@localhost:5432/aura_db
      run: npx prisma migrate dev --name init

    - name: Run Backend Unit Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://aura_user:aura_password@localhost:5432/aura_db
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: super_secret_jwt_signature_key_2026
        PORT: 3000
      run: npm run test

    - name: Run Backend E2E Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://aura_user:aura_password@localhost:5432/aura_db
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: super_secret_jwt_signature_key_2026
        PORT: 3000
        NODE_OPTIONS: "--experimental-vm-modules"
      run: npm run test:e2e
