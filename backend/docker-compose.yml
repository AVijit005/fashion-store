version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aura-postgres
    restart: always
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_password
      POSTGRES_DB: aura_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aura-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: aura-minio
    restart: always
    environment:
      MINIO_ROOT_USER: aura_admin
      MINIO_ROOT_PASSWORD: aura_password
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
