version: '3.8'

services:
  # -----------------------------------------------------
  # 🌐 Frontend (TanStack Start + React 19)
  # -----------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-frontend
    restart: always
    ports:
      - '8080:8080' # Expose Vite dev server
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

  # -----------------------------------------------------
  # ⚙️ Backend (NestJS + Prisma)
  # -----------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aura-backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://aura_user:aura_password@postgres:5432/aura_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_signature_key_2026
      - NODE_ENV=development
      - PORT=3000
      - FRONTEND_ORIGINS=http://localhost:8080
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=aura_admin
      - S3_SECRET_KEY=aura_password
      - S3_REGION=us-east-1
      - S3_BUCKET=aura-bucket
      - PUBLIC_URL=http://localhost:3000
    depends_on:
      - postgres
      - redis
      - minio

  # -----------------------------------------------------
  # 🗄️ PostgreSQL Database
  # -----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: aura-postgres
    restart: always
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_password
      POSTGRES_DB: aura_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  # -----------------------------------------------------
  # ⚡ Redis Cache & Queues
  # -----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aura-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  # -----------------------------------------------------
  # 🪣 MinIO (S3 Compatible Storage)
  # -----------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: aura-minio
    restart: always
    environment:
      MINIO_ROOT_USER: aura_admin
      MINIO_ROOT_PASSWORD: aura_password
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
